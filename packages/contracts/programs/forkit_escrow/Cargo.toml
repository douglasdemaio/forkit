[package]
name = "forkit-escrow"
version = "0.1.0"
description = "ForkIt escrow program for decentralized food delivery"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "forkit_escrow"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl = "0.30.0"
